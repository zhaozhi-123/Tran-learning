<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 游戏容器 */
        .game-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        /* 游戏标题 */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        /* 游戏信息栏 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }

        .score-section {
            display: flex;
            gap: 20px;
        }

        .score-item {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .score-item span {
            color: #4CAF50;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #0b7dda;
        }

        .btn-danger {
            background-color: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background-color: #da190b;
        }

        /* 难度选择 */
        .difficulty-selector {
            margin-bottom: 20px;
        }

        .difficulty-selector label {
            margin-right: 10px;
            font-weight: bold;
        }

        .difficulty-selector select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        /* 游戏画布 */
        .game-canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        canvas {
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        /* 游戏操作指引 */
        .game-guide {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .game-guide h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .game-guide ul {
            list-style-type: none;
            padding-left: 20px;
        }

        .game-guide li {
            margin-bottom: 5px;
        }

        /* 分数排行榜 */
        .leaderboard {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }

        .leaderboard h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .leaderboard-list {
            list-style-type: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        /* 游戏结束模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #f44336;
        }

        .modal-content p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .game-info {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }

            .score-section {
                justify-content: space-around;
            }

            .controls {
                justify-content: center;
            }

            canvas {
                max-width: 100%;
                height: auto;
            }
        }

        /* 移动设备控制按钮 */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .mobile-btn {
            padding: 15px;
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #f0f0f0;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mobile-btn:hover {
            background-color: #e0e0e0;
        }

        .mobile-btn:nth-child(2) {
            grid-row: 1;
            grid-column: 2;
        }

        .mobile-btn:nth-child(4) {
            grid-row: 2;
            grid-column: 1;
        }

        .mobile-btn:nth-child(5) {
            grid-row: 2;
            grid-column: 2;
        }

        .mobile-btn:nth-child(6) {
            grid-row: 2;
            grid-column: 3;
        }

        .mobile-btn:nth-child(8) {
            grid-row: 3;
            grid-column: 2;
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>贪吃蛇游戏</h1>
        
        <!-- 游戏信息栏 -->
        <div class="game-info">
            <div class="score-section">
                <div class="score-item">分数: <span id="score">0</span></div>
                <div class="score-item">最高分数: <span id="high-score">0</span></div>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="start-btn">开始游戏</button>
                <button class="btn btn-secondary" id="pause-btn" disabled>暂停</button>
                <button class="btn btn-danger" id="restart-btn" disabled>重新开始</button>
            </div>
        </div>
        
        <!-- 难度选择 -->
        <div class="difficulty-selector">
            <label for="difficulty">难度:</label>
            <select id="difficulty">
                <option value="easy">简单</option>
                <option value="medium">中等</option>
                <option value="hard">困难</option>
            </select>
        </div>
        
        <!-- 游戏画布 -->
        <div class="game-canvas-container">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
        </div>
        
        <!-- 移动设备控制按钮 -->
        <div class="mobile-controls">
            <button class="mobile-btn" data-direction="up">↑</button>
            <button class="mobile-btn" data-direction="left">←</button>
            <button class="mobile-btn" data-direction="down">↓</button>
            <button class="mobile-btn" data-direction="right">→</button>
        </div>
        
        <!-- 游戏操作指引 -->
        <div class="game-guide">
            <h3>游戏操作指引</h3>
            <ul>
                <li>使用方向键控制蛇的移动方向</li>
                <li>吃到食物可以增加分数和蛇的长度</li>
                <li>撞到墙壁或自己的身体游戏结束</li>
                <li>难度越高，蛇的移动速度越快</li>
            </ul>
        </div>
        
        <!-- 分数排行榜 -->
        <div class="leaderboard">
            <h3>分数排行榜</h3>
            <ul class="leaderboard-list" id="leaderboard-list">
                <!-- 排行榜数据将通过JavaScript动态生成 -->
            </ul>
        </div>
    </div>
    
    <!-- 游戏结束模态框 -->
    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <p>你的得分: <span id="final-score">0</span></p>
            <div class="modal-buttons">
                <button class="btn btn-primary" id="play-again-btn">再玩一次</button>
                <button class="btn btn-secondary" id="close-modal-btn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const config = {
            gridSize: 20,
            initialSpeed: {
                easy: 150,
                medium: 100,
                hard: 50
            }
        };

        // 游戏状态
        let gameState = {
            snake: [],
            food: {},
            direction: 'right',
            nextDirection: 'right',
            score: 0,
            highScore: 0,
            gameSpeed: config.initialSpeed.easy,
            isRunning: false,
            isPaused: false,
            gameLoop: null
        };

        // 获取DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const restartBtn = document.getElementById('restart-btn');
        const difficultySelect = document.getElementById('difficulty');
        const gameOverModal = document.getElementById('game-over-modal');
        const finalScoreElement = document.getElementById('final-score');
        const playAgainBtn = document.getElementById('play-again-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const leaderboardList = document.getElementById('leaderboard-list');

        // 初始化游戏
        function initGame() {
            // 初始化蛇的位置
            gameState.snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            
            // 初始化食物位置
            generateFood();
            
            // 初始化方向
            gameState.direction = 'right';
            gameState.nextDirection = 'right';
            
            // 初始化分数
            gameState.score = 0;
            updateScore();
            
            // 加载最高分数
            loadHighScore();
            
            // 加载排行榜
            loadLeaderboard();
            
            // 绘制游戏
            drawGame();
        }

        // 生成食物
        function generateFood() {
            const maxX = Math.floor(canvas.width / config.gridSize);
            const maxY = Math.floor(canvas.height / config.gridSize);
            
            let foodX, foodY;
            let isFoodOnSnake;
            
            do {
                foodX = Math.floor(Math.random() * maxX);
                foodY = Math.floor(Math.random() * maxY);
                
                isFoodOnSnake = gameState.snake.some(segment => segment.x === foodX && segment.y === foodY);
            } while (isFoodOnSnake);
            
            gameState.food = { x: foodX, y: foodY };
        }

        // 绘制游戏
        function drawGame() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制蛇
            ctx.fillStyle = '#4CAF50';
            gameState.snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#2E7D32';
                } else {
                    // 蛇身
                    ctx.fillStyle = '#4CAF50';
                }
                ctx.fillRect(segment.x * config.gridSize, segment.y * config.gridSize, config.gridSize - 1, config.gridSize - 1);
            });
            
            // 绘制食物
            ctx.fillStyle = '#F44336';
            ctx.fillRect(gameState.food.x * config.gridSize, gameState.food.y * config.gridSize, config.gridSize - 1, config.gridSize - 1);
        }

        // 更新游戏状态
        function updateGame() {
            if (!gameState.isRunning || gameState.isPaused) return;
            
            // 更新方向
            gameState.direction = gameState.nextDirection;
            
            // 计算蛇头的新位置
            const head = { ...gameState.snake[0] };
            switch (gameState.direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }
            
            // 检查碰撞
            if (checkCollision(head)) {
                gameOver();
                return;
            }
            
            // 检查是否吃到食物
            if (head.x === gameState.food.x && head.y === gameState.food.y) {
                // 增加分数
                gameState.score += 10;
                updateScore();
                
                // 生成新食物
                generateFood();
                
                // 蛇身增长（不删除尾部）
            } else {
                // 移动蛇（删除尾部）
                gameState.snake.pop();
            }
            
            // 将新蛇头添加到数组开头
            gameState.snake.unshift(head);
            
            // 绘制游戏
            drawGame();
        }

        // 检查碰撞
        function checkCollision(head) {
            // 检查边界碰撞
            if (head.x < 0 || head.x >= canvas.width / config.gridSize || 
                head.y < 0 || head.y >= canvas.height / config.gridSize) {
                return true;
            }
            
            // 检查自身碰撞
            for (let i = 1; i < gameState.snake.length; i++) {
                if (head.x === gameState.snake[i].x && head.y === gameState.snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }

        // 游戏结束
        function gameOver() {
            clearInterval(gameState.gameLoop);
            gameState.isRunning = false;
            
            // 更新最高分数
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                saveHighScore();
                updateLeaderboard();
            }
            
            // 显示游戏结束模态框
            finalScoreElement.textContent = gameState.score;
            gameOverModal.style.display = 'block';
            
            // 更新按钮状态
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            restartBtn.disabled = true;
        }

        // 更新分数
        function updateScore() {
            scoreElement.textContent = gameState.score;
            highScoreElement.textContent = gameState.highScore;
        }

        // 保存最高分数
        function saveHighScore() {
            localStorage.setItem('snakeGameHighScore', gameState.highScore);
        }

        // 加载最高分数
        function loadHighScore() {
            const savedHighScore = localStorage.getItem('snakeGameHighScore');
            if (savedHighScore) {
                gameState.highScore = parseInt(savedHighScore);
                updateScore();
            }
        }

        // 更新排行榜
        function updateLeaderboard() {
            let leaderboard = JSON.parse(localStorage.getItem('snakeGameLeaderboard') || '[]');
            
            // 添加新分数
            leaderboard.push({
                score: gameState.score,
                date: new Date().toLocaleString()
            });
            
            // 按分数排序
            leaderboard.sort((a, b) => b.score - a.score);
            
            // 只保留前10名
            leaderboard = leaderboard.slice(0, 10);
            
            // 保存排行榜
            localStorage.setItem('snakeGameLeaderboard', JSON.stringify(leaderboard));
            
            // 显示排行榜
            displayLeaderboard(leaderboard);
        }

        // 加载排行榜
        function loadLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem('snakeGameLeaderboard') || '[]');
            displayLeaderboard(leaderboard);
        }

        // 显示排行榜
        function displayLeaderboard(leaderboard) {
            leaderboardList.innerHTML = '';
            
            if (leaderboard.length === 0) {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.textContent = '暂无记录';
                leaderboardList.appendChild(li);
                return;
            }
            
            leaderboard.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.innerHTML = `<span>${index + 1}. ${entry.date}</span><span>${entry.score}</span>`;
                leaderboardList.appendChild(li);
            });
        }

        // 开始游戏
        function startGame() {
            if (gameState.isRunning) return;
            
            gameState.isRunning = true;
            gameState.isPaused = false;
            
            // 根据难度设置游戏速度
            const difficulty = difficultySelect.value;
            gameState.gameSpeed = config.initialSpeed[difficulty];
            
            // 启动游戏循环
            gameState.gameLoop = setInterval(updateGame, gameState.gameSpeed);
            
            // 更新按钮状态
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            restartBtn.disabled = false;
        }

        // 暂停游戏
        function pauseGame() {
            if (!gameState.isRunning) return;
            
            gameState.isPaused = !gameState.isPaused;
            pauseBtn.textContent = gameState.isPaused ? '继续' : '暂停';
        }

        // 重新开始游戏
        function restartGame() {
            clearInterval(gameState.gameLoop);
            initGame();
            startGame();
        }

        // 处理键盘输入
        function handleKeyPress(e) {
            switch (e.key) {
                case 'ArrowUp':
                    if (gameState.direction !== 'down') {
                        gameState.nextDirection = 'up';
                    }
                    break;
                case 'ArrowDown':
                    if (gameState.direction !== 'up') {
                        gameState.nextDirection = 'down';
                    }
                    break;
                case 'ArrowLeft':
                    if (gameState.direction !== 'right') {
                        gameState.nextDirection = 'left';
                    }
                    break;
                case 'ArrowRight':
                    if (gameState.direction !== 'left') {
                        gameState.nextDirection = 'right';
                    }
                    break;
                case ' ':
                    // 空格键暂停/继续
                    if (gameState.isRunning) {
                        pauseGame();
                    }
                    break;
            }
        }

        // 处理移动设备控制
        function handleMobileControl(e) {
            const direction = e.target.dataset.direction;
            if (direction) {
                switch (direction) {
                    case 'up':
                        if (gameState.direction !== 'down') {
                            gameState.nextDirection = 'up';
                        }
                        break;
                    case 'down':
                        if (gameState.direction !== 'up') {
                            gameState.nextDirection = 'down';
                        }
                        break;
                    case 'left':
                        if (gameState.direction !== 'right') {
                            gameState.nextDirection = 'left';
                        }
                        break;
                    case 'right':
                        if (gameState.direction !== 'left') {
                            gameState.nextDirection = 'right';
                        }
                        break;
                }
            }
        }

        // 事件监听器
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        restartBtn.addEventListener('click', restartGame);
        playAgainBtn.addEventListener('click', () => {
            gameOverModal.style.display = 'none';
            restartGame();
        });
        closeModalBtn.addEventListener('click', () => {
            gameOverModal.style.display = 'none';
        });
        window.addEventListener('keydown', handleKeyPress);
        
        // 移动设备控制按钮事件
        document.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('click', handleMobileControl);
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
