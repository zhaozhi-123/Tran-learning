<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线客服系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-comments"></i> 在线客服</h2>
                <div class="online-count">
                    <span class="online-dot"></span>
                    <span>3位客服在线</span>
                </div>
            </div>
            
            <div class="conversation-list">
                <div class="conversation-item active" data-conversation="1">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="conversation-info">
                        <h4>客服小美</h4>
                        <p>您好，请问有什么可以帮助您的？</p>
                    </div>
                    <div class="conversation-status online"></div>
                </div>
                
                <div class="conversation-item" data-conversation="2">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="conversation-info">
                        <h4>客服小王</h4>
                        <p>很高兴为您服务</p>
                    </div>
                    <div class="conversation-status online"></div>
                </div>
                
                <div class="conversation-item" data-conversation="3">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="conversation-info">
                        <h4>客服小李</h4>
                        <p>请问有什么问题？</p>
                    </div>
                    <div class="conversation-status online"></div>
                </div>
                
                <div class="conversation-item" data-conversation="4">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="conversation-info">
                        <h4>历史对话</h4>
                        <p>昨天 14:30</p>
                    </div>
                    <div class="conversation-status offline"></div>
                </div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-info">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div>
                        <h3>客服小美</h3>
                        <span class="status-text"><span class="online-dot"></span> 在线</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="action-btn" title="查看资料">
                        <i class="fas fa-user"></i>
                    </button>
                    <button class="action-btn" title="语音通话">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="action-btn" title="视频通话">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="action-btn" title="关闭对话">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <div class="message-container" id="message-container">
                <div class="message received">
                    <div class="message-content">
                        <p>您好！欢迎使用在线客服服务。我是客服小美，很高兴为您服务。</p>
                    </div>
                    <div class="message-time">10:00</div>
                </div>
                
                <div class="message received">
                    <div class="message-content">
                        <p>请问有什么可以帮助您的？</p>
                    </div>
                    <div class="message-time">10:00</div>
                </div>
                
                <div class="message sent">
                    <div class="message-content">
                        <p>你好，我想咨询一下产品的使用问题。</p>
                    </div>
                    <div class="message-time">10:01</div>
                </div>
                
                <div class="message received">
                    <div class="message-content">
                        <p>当然可以！请问具体是哪个产品呢？我们有多种产品，我需要了解更多信息才能更好地帮助您。</p>
                    </div>
                    <div class="message-time">10:02</div>
                </div>
            </div>
            
            <div class="quick-replies">
                <button class="quick-reply-btn">订单查询</button>
                <button class="quick-reply-btn">退款问题</button>
                <button class="quick-reply-btn">产品使用</button>
                <button class="quick-reply-btn">售后服务</button>
            </div>
            
            <div class="input-area">
                <div class="input-tools">
                    <button class="tool-btn" title="发送图片">
                        <i class="fas fa-image"></i>
                    </button>
                    <button class="tool-btn" title="发送文件">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <button class="tool-btn" title="表情">
                        <i class="fas fa-smile"></i>
                    </button>
                    <button class="tool-btn" title="快捷短语">
                        <i class="fas fa-lightbulb"></i>
                    </button>
                </div>
                <input type="text" id="message-input" placeholder="请输入消息..." />
                <button id="send-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
